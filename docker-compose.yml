services:
  postgres:
    image: postgres:16-alpine
    container_name: bizztob-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bizztob
      POSTGRES_PASSWORD: bizztob
      POSTGRES_DB: bizztob
    ports:
      - "5432:5432"
    volumes:
      - bizztob-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bizztob -d bizztob"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bizztob-pgdata:
