# MongoDB 7 as a single-node replica set.
# The replica set is required because Prisma uses transactions
# for order placement / cancellation.
#
# The healthcheck also handles first-run initialization so that
# `docker compose up -d` gives you a fully-usable Mongo in ~15 seconds.

services:
  mongo:
    image: mongo:7
    container_name: bizztob-mongo
    restart: unless-stopped
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    volumes:
      - bizztob-mongo:/data/db
    healthcheck:
      test: >-
        mongosh --port 27017 --quiet --eval
        "try { rs.status().ok } catch (e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: '127.0.0.1:27017' }] }).ok }"
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 0s

volumes:
  bizztob-mongo:
